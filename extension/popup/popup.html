<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 200px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #21201e;
      color: #e2e0dc;
      padding: 16px;
    }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 12px; letter-spacing: 0.3px; }
    button {
      width: 100%;
      padding: 9px 12px;
      border: none;
      border-radius: 7px;
      background: #d4a373;
      color: #1a1917;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s;
    }
    button:hover { filter: brightness(1.1); }
    p { font-size: 11px; color: #6e6a63; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <h1>SnipBoard</h1>
  <button id="open">Open Canvas</button>
  <p>Paste · Draw · Annotate</p>
  <script src="popup.js"></script>
</body>
</html>
