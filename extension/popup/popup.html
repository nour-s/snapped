<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 200px;
      font-family: system-ui, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 16px;
    }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 12px; letter-spacing: 0.3px; }
    button {
      width: 100%;
      padding: 9px 12px;
      border: none;
      border-radius: 6px;
      background: #89b4fa;
      color: #1e1e2e;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #b4d0fa; }
    p { font-size: 11px; color: #6c7086; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <h1>SnipBoard</h1>
  <button id="open">Open Canvas</button>
  <p>Paste · Draw · Annotate</p>
  <script src="popup.js"></script>
</body>
</html>
